# Maps Bokeh glyph class names to the method used on bokeh.plotting.figure.
# Some classes are abstract/base aliases and map to a practical fallback.

[glyph_to_figure_method]
AnnularWedge = "annular_wedge"
Annulus = "annulus"
Arc = "arc"
Block = "block"
Circle = "circle"
Ellipse = "ellipse"
Image = "image"
ImageBase = "image"
ImageRGBA = "image_rgba"
ImageStack = "image"
ImageURL = "image_url"
Line = "line"
Marker = "scatter"
MathMLGlyph = "text"
MathTextGlyph = "text"
Ngon = "ngon"
Patch = "patch"
Ray = "ray"
Rect = "rect"
Scatter = "scatter"
Step = "step"
TeXGlyph = "tex"
Text = "text"
Wedge = "wedge"

[glyph_to_figure_method_vertical]
VArea = "varea"
VAreaStep = "varea_step"
VBar = "vbar"
VSpan = "vspan"

[glyph_to_figure_method_horizontal]
HArea = "harea"
HAreaStep = "harea_step"
HBar = "hbar"
HSpan = "hspan"

[glyph_specialized_functions]
hbar_stack
vbar_stack
hline_stack
vline_stack
harea_stack
varea_stack
hexbin()
